services:
  bitcoin-ckpool:
    image: bitcoin-ckpool-fixed
    command: ["-k"]
    container_name: bitcoin-ckpool
    environment:
      TESTNET: "0"
      ALGO: "sha256d"
      DAEMON: "1"
      SERVER: "1"
      TXINDEX: "0"
      MAXCONNECTIONS: "300"
      DISABLEWALLET: "0"
      RPCALLOWIP: "0.0.0.0/0"
      PORT: "8433"
      RPCPORT: "8432"
      RPCBIND: "0.0.0.0"
      RPCUSER: ${RPCUSER}
      RPCPASSWORD: ${RPCPASSWORD}
      ONLYNET: "IPv4"
      ZMQPUBHASHBLOCK: "tcp://127.0.0.1:28435"
      DATADIR: "/home/cna.bitcoin/mainnet"
      BTCD_URL: "127.0.0.1:8432"
      BTCD_AUTH: ${BTCD_AUTH}
      BTCD_PASS: ${BTCD_PASS}
      SERVERURL: "0.0.0.0:3333"
      BTCADDRESS: "bc1qwscve970s9wgczave2rsuzedjpjfh76v2mjwpj"
      BTCSIG: "/BitKot | TRACE/"
      BLOCKPOLL: "10"
      DONATION: "1.0"
      NONCE1LENGTH: "4"
      NONCE2LENGTH: "8"
      UPDATE_INTERVAL: "60"
      VERSION_MASK: "1fffe000"
      MINDIFF: "100000"
      STARTDIFF: "100000"
      LOGDIR: "/logs"
      ZMQBLOCK: "tcp://127.0.0.1:28435"
    volumes:
      - ./ckpool/data:/home/cna.bitcoin/mainnet
    ports:
      - "8435:8433"
      - "8434:8432"
      - "6660:3333"
      - "3334:3333"
      - "4029:4028"
      - "4001:80"

  db-bitcoin:
    image: postgres:13
    container_name: db-bitcoin
    environment:
      POSTGRES_USER: ckstats
      POSTGRES_PASSWORD: ckstats
      POSTGRES_DB: ckstats
    volumes:
      - ./db/data:/var/lib/postgresql/data
      - ./db/init-user-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ckstats -t 20 && psql -U ckstats -d dbshadow -c 'SELECT 1' >/dev/null 2>&1"]
      interval: 20s
      timeout: 30s
      retries: 5
